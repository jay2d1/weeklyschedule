<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ───────────────────────────────────────────── -->

  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-pill">LIVE</span>
        <div class="header-text">
          <h1 class="site-title">Weekly Schedule</h1>
          <p class="site-subtitle" id="week-label">Loading…</p>
        </div>
      </div>
      <nav class="header-right">
        <button class="btn-ghost" id="today-btn">Today</button>
        <div class="group-selector">
  <span class="group-label">Group</span>
  <button class="group-btn active" data-group="all">All</button>
  <button class="group-btn" data-group="A">A</button>
  <button class="group-btn" data-group="B">B</button>
  <button class="group-btn" data-group="C">C</button>
  <button class="group-btn" data-group="D">D</button>
  <button class="group-btn" data-group="E">E</button>
</div>

        <div class="week-nav">
          <button class="week-arrow" id="prev-week" aria-label="Previous week">&#8592;</button>
          <button class="week-arrow" id="next-week" aria-label="Next week">&#8594;</button>
        </div>
      </nav>
    </div>
  </header>

  <!-- ── MAIN CONTENT ─────────────────────────────────────── -->

  <main class="main-content">

```
<!-- Legend -->
<div class="legend" id="legend"></div>

<!-- Scroll wrapper for the grid -->
<div class="grid-scroll-wrapper">
  <div class="schedule-grid" id="schedule-grid">
    <!-- Injected by JS -->
  </div>
</div>

<!-- Empty state -->
<div class="empty-state hidden" id="empty-state">
  <div class="empty-icon">📭</div>
  <p>No classes scheduled this week.</p>
</div>
```

  </main>

  <!-- ── FOOTER / CTA ─────────────────────────────────────── -->

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-note">All times are local. Sync once — always up to date.</p>
      <a href="schedule.ics" download class="ics-btn">
        <span class="ics-icon">
          <!-- Calendar SVG -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        <span class="ics-label">
          <span class="ics-main">Add to Calendar</span>
          <span class="ics-sub">Import all events · .ICS file</span>
        </span>
        <span class="ics-arrow">↗</span>
      </a>
    </div>
  </footer>

  <!-- ── EVENT DETAIL MODAL ───────────────────────────────── -->

  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <div class="modal-color-bar" id="modal-color-bar"></div>
      <div class="modal-body">
        <p class="modal-tag" id="modal-tag"></p>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-topic" id="modal-topic"></p>
        <div class="modal-meta">
          <div class="modal-meta-item">
            <span class="meta-icon">👤</span>
            <span id="modal-faculty"></span>
          </div>
          <div class="modal-meta-item">
            <span class="meta-icon">🕐</span>
            <span id="modal-time"></span>
          </div>
          <div class="modal-meta-item">
            <span class="meta-icon">📅</span>
            <span id="modal-day"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
